version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: miniexchange
      POSTGRES_USER: miniexchange
      POSTGRES_PASSWORD: miniexchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniexchange"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/miniexchange
      DATABASE_USERNAME: miniexchange
      DATABASE_PASSWORD: miniexchange
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
